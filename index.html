<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* Modern deep space gradient */
            background: radial-gradient(circle at top left, #1a1a2e, #16213e, #0f3460);
            overflow: hidden;
        }

        /* The Glass Card */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4rem 8rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1 {
            color: white;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 1.5rem;
            text-indent: 1.5rem; /* Centers the text properly despite letter spacing */
            text-transform: uppercase;
            opacity: 0.9;
            /* Subtle glow effect */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            animation: breathe 4s ease-in-out infinite;
        }

        /* Subtle pulsing animation */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
        }

        /* Decorative background blobs to enhance the glass effect */
        .blob {
            position: absolute;
            z-index: -1;
            border-radius: 50%;
            filter: blur(60px);
            opacity: 0.4;
        }

        .blob-1 {
            width: 300px;
            height: 300px;
            background: #4e00c2;
            top: 20%;
            left: 20%;
        }

        .blob-2 {
            width: 250px;
            height: 250px;
            background: #0077b6;
            bottom: 20%;
            right: 20%;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <h1>SOON</h1>
    </div>
</body>
</html>
