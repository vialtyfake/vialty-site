<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #121212;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 3rem 5rem;
            border: 1px solid #333;
            background: #1a1a1a;
        }

        h1 {
            color: #e0e0e0;
            font-size: 4rem;
            font-weight: 700;
            letter-spacing: 0.5rem;
            text-transform: uppercase;
        }

        p {
            color: #888;
            margin-top: 1rem;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>SOON</h1>
        <p>Something new is coming.</p>
    </div>
</body>
</html>
